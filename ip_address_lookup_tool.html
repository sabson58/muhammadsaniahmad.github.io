
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>IP Lookup</title>
  <link rel="stylesheet" href="ipstyles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>

<div class="wrap">
  <div class="hero">
    <p class="hero-title">IP address lookup</p>
    <p class="hero-sub">Enter any IP address to get location, ISP, and network details.</p>
    <div class="search-row">
      <input type="text" id="ipInput" placeholder="e.g. 8.8.8.8" />
      <button class="search-btn" id="lookupBtn">Look up</button>
    </div>
    <p class="my-ip">Your IP: <span id="myIp" onclick="useMyIp()">loading...</span></p>
    <div class="error hidden" id="errMsg"></div>
  </div>

  <div id="resultSection" class="hidden">
    <div class="result">
      <div class="result-header">
        <div>
          <div class="ip-badge" id="resIp"></div>
          <div class="ip-loc" id="resLoc"></div>
        </div>
      </div>
      <div class="result-grid">
        <div class="result-item"><div class="item-label">Country</div><div class="item-value" id="resCountry"></div></div>
        <div class="result-item"><div class="item-label">Region</div><div class="item-value" id="resRegion"></div></div>
        <div class="result-item"><div class="item-label">City</div><div class="item-value" id="resCity"></div></div>
        <div class="result-item"><div class="item-label">Timezone</div><div class="item-value" id="resTimezone"></div></div>
        <div class="result-item"><div class="item-label">ISP / Org</div><div class="item-value" id="resIsp"></div></div>
        <div class="result-item"><div class="item-label">ASN</div><div class="item-value mono" id="resAsn"></div></div>
      </div>
    </div>

    <div class="map-card">
      <div class="map-inner">
        <div class="map-placeholder">
          <div class="pin"><div class="pin-circle"></div><div class="pin-shadow"></div></div>
          <div id="mapLabel">Location pinned</div>
        </div>
      </div>
      <div class="coords" id="resCoords"></div>
    </div>
  </div>

  <div id="historySection" class="hidden">
    <div class="history-card">
      <p class="history-title">Recent lookups</p>
      <div class="history-list" id="historyList"></div>
    </div>
  </div>
</div>





<script src="ipapp.js"></script>
</body>
</html>
