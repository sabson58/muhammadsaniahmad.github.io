<style>
*{box-sizing:border-box;margin:0;padding:0}
.wrap{max-width:480px;margin:2rem auto;padding:0 1rem}
.card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:2rem}
.title{font-size:18px;font-weight:500;color:var(--color-text-primary);margin-bottom:0.25rem}
.sub{font-size:13px;color:var(--color-text-secondary);margin-bottom:1.5rem}
.input-wrap{position:relative;margin-bottom:1.25rem}
.input-wrap input{width:100%;padding-right:44px;font-family:var(--font-mono);font-size:15px}
.toggle{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--color-text-secondary);font-size:13px;padding:4px 6px}
.bar-row{display:flex;gap:6px;margin-bottom:0.75rem}
.bar-seg{height:5px;flex:1;border-radius:3px;background:var(--color-border-tertiary);transition:background 0.3s}
.strength-label{font-size:13px;font-weight:500;margin-bottom:1.25rem;min-height:20px}
.checks{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:1.5rem}
.check{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--color-text-secondary)}
.dot{width:8px;height:8px;border-radius:50%;background:var(--color-border-tertiary);flex-shrink:0;transition:background 0.2s}
.dot.ok{background:#639922}
.check.ok{color:var(--color-text-primary)}
.score-row{display:flex;gap:12px}
.score-card{flex:1;background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:0.75rem 1rem}
.score-card .num{font-size:22px;font-weight:500;color:var(--color-text-primary)}
.score-card .lbl{font-size:11px;color:var(--color-text-secondary);margin-top:2px}
.tip{margin-top:1.25rem;padding:0.75rem 1rem;background:var(--color-background-secondary);border-radius:var(--border-radius-md);font-size:13px;color:var(--color-text-secondary);min-height:44px;line-height:1.6}
</style>

<div class="wrap">
  <div class="card">
    <p class="title">Password strength checker</p>
    <p class="sub">Type a password to analyse its strength in real time.</p>
    <div class="input-wrap">
      <input type="password" id="pwd" placeholder="Enter a password..." autocomplete="off" />
      <button class="toggle" id="toggleBtn" onclick="toggleShow()">show</button>
    </div>
    <div class="bar-row">
      <div class="bar-seg" id="s1"></div>
      <div class="bar-seg" id="s2"></div>
      <div class="bar-seg" id="s3"></div>
      <div class="bar-seg" id="s4"></div>
    </div>
    <p class="strength-label" id="strengthLabel" style="color:var(--color-text-tertiary)">Start typing to see your score</p>
    <div class="checks">
      <div class="check" id="c-len"><div class="dot" id="d-len"></div>8+ characters</div>
      <div class="check" id="c-upper"><div class="dot" id="d-upper"></div>Uppercase letter</div>
      <div class="check" id="c-lower"><div class="dot" id="d-lower"></div>Lowercase letter</div>
      <div class="check" id="c-num"><div class="dot" id="d-num"></div>Number</div>
      <div class="check" id="c-sym"><div class="dot" id="d-sym"></div>Special character</div>
      <div class="check" id="c-long"><div class="dot" id="d-long"></div>12+ characters</div>
    </div>
    <div class="score-row">
      <div class="score-card"><div class="num" id="scoreNum">0</div><div class="lbl">Score / 6</div></div>
      <div class="score-card"><div class="num" id="crackTime">—</div><div class="lbl">Est. crack time</div></div>
    </div>
    <div class="tip" id="tip">Your password analysis will appear here.</div>
  </div>
</div>

<script>
const colors={0:'var(--color-text-tertiary)',1:'#E24B4A',2:'#BA7517',3:'#BA7517',4:'#639922',5:'#1D9E75',6:'#0F6E56'};
const barColors={1:'#E24B4A',2:'#BA7517',3:'#EF9F27',4:'#639922'};
const labels={0:'',1:'Very weak',2:'Weak',3:'Fair',4:'Good',5:'Strong',6:'Very strong'};
const tips={0:'Your password analysis will appear here.',1:'This password is easily guessable. Avoid common words.',2:'Better, but add uppercase letters, numbers, or symbols.',3:'Getting there — try mixing in more character types.',4:'Good password! Adding more characters will make it stronger.',5:'Strong password! Well done.',6:'Excellent! This is a very strong password.'};
const cracks=['instant','less than a second','a few seconds','minutes','hours','days','centuries'];

function score(p){
  let s=0;
  if(p.length>=8)s++;
  if(p.length>=12)s++;
  if(/[A-Z]/.test(p))s++;
  if(/[a-z]/.test(p))s++;
  if(/[0-9]/.test(p))s++;
  if(/[^A-Za-z0-9]/.test(p))s++;
  return s;
}

function update(){
  const p=document.getElementById('pwd').value;
  const s=p.length?score(p):0;

  const checks={len:p.length>=8,upper:/[A-Z]/.test(p),lower:/[a-z]/.test(p),num:/[0-9]/.test(p),sym:/[^A-Za-z0-9]/.test(p),long:p.length>=12};
  Object.entries(checks).forEach(([k,v])=>{
    document.getElementById('c-'+k).className='check'+(v?' ok':'');
    document.getElementById('d-'+k).className='dot'+(v?' ok':'');
  });

  const segs=[document.getElementById('s1'),document.getElementById('s2'),document.getElementById('s3'),document.getElementById('s4')];
  const filled=p.length?Math.max(1,Math.ceil(s/1.5)):0;
  segs.forEach((el,i)=>{el.style.background=i<filled?barColors[Math.min(4,filled)]:'var(--color-border-tertiary)'});

  document.getElementById('strengthLabel').textContent=p.length?labels[s]:'Start typing to see your score';
  document.getElementById('strengthLabel').style.color=colors[s];
  document.getElementById('scoreNum').textContent=s;
  document.getElementById('crackTime').textContent=p.length?cracks[s]:'—';
  document.getElementById('tip').textContent=tips[s];
}

function toggleShow(){
  const inp=document.getElementById('pwd');
  const btn=document.getElementById('toggleBtn');
  if(inp.type==='password'){inp.type='text';btn.textContent='hide';}
  else{inp.type='password';btn.textContent='show';}
}

document.getElementById('pwd').addEventListener('input',update);
</script>
