<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finance Tracker – Muhammad Sani Ahmad</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui;background:#f8f6f1;color:#0f172a}
body.dark{background:#020617;color:#f8fafc}

nav{display:flex;justify-content:space-between;align-items:center;padding:1rem 2rem;background:#0f172a;color:#f8f6f1}
.nav-logo{font-weight:600;font-size:1rem}
.nav-back{color:#c9a96e;text-decoration:none;font-size:13px;letter-spacing:0.05em}
.nav-back:hover{text-decoration:underline}
.theme-toggle{background:none;border:1px solid rgba(255,255,255,0.2);color:#f8f6f1;padding:4px 12px;border-radius:20px;cursor:pointer;font-size:12px}

.wrap{max-width:700px;margin:2rem auto;padding:1rem}

.summary{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1.5rem}
.s-card{padding:1rem;border-radius:10px;background:#fff;border:1px solid #e5e0d5}
body.dark .s-card{background:#0f172a;border-color:#1f2937}
.s-card .lbl{font-size:12px;color:#64748b;margin-bottom:4px}
.s-card .num{font-size:22px;font-weight:600}
.income .num{color:#22c55e}
.expense .num{color:#ef4444}

.card{background:#fff;padding:1.2rem;border-radius:12px;margin-bottom:1rem;border:1px solid #e5e0d5}
body.dark .card{background:#0f172a;border-color:#1f2937}
.card-title{font-weight:600;margin-bottom:1rem;font-size:15px}

.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
input,select{padding:8px 10px;border-radius:6px;border:1px solid #ccc;width:100%;font-size:14px;background:#fff;color:#0f172a}
body.dark input,body.dark select{background:#020617;color:#fff;border-color:#1f2937}
input:focus,select:focus{outline:none;border-color:#c9a96e}

.add-btn{padding:10px 20px;border:none;border-radius:8px;background:#c9a96e;color:#0f172a;cursor:pointer;font-weight:600;font-size:14px;width:100%;margin-top:4px;transition:opacity 0.2s}
.add-btn:hover{opacity:0.85}

.filter-row{display:flex;gap:6px;margin-bottom:10px}
.filter-btn{flex:1;padding:7px;cursor:pointer;border:1px solid #e5e0d5;border-radius:8px;background:#fff;font-size:13px;transition:all 0.2s}
body.dark .filter-btn{background:#0f172a;border-color:#1f2937;color:#f8fafc}
.filter-btn.active{background:#0f172a;color:#fff;border-color:#0f172a}
body.dark .filter-btn.active{background:#c9a96e;color:#0f172a;border-color:#c9a96e}

.tx{display:flex;justify-content:space-between;align-items:center;padding:10px;border-radius:8px;margin-bottom:6px;background:#f8f6f1}
body.dark .tx{background:#0f172a;border:1px solid #1f2937}
.tx-left{display:flex;flex-direction:column;gap:2px}
.tx-desc{font-size:14px;font-weight:500}
.tx-date{font-size:11px;color:#64748b}
.tx-right{display:flex;align-items:center;gap:10px}
.tx-amt{font-size:15px;font-weight:600}
.tx.inc .tx-amt{color:#22c55e}
.tx.exp .tx-amt{color:#ef4444}
.del-btn{background:none;border:none;cursor:pointer;color:#94a3b8;font-size:16px;padding:2px 6px;border-radius:4px}
.del-btn:hover{color:#ef4444;background:#fee2e2}

.empty{text-align:center;padding:2rem;color:#94a3b8;font-size:14px}

.chart-card{background:#fff;padding:1.2rem;border-radius:12px;border:1px solid #e5e0d5}
body.dark .chart-card{background:#0f172a;border-color:#1f2937}
.chart-title{font-weight:600;margin-bottom:1rem;font-size:15px}
canvas{max-height:220px}
</style>
</head>
<body>

<nav>
  <a href="../../index.html" class="nav-back">← Back to portfolio</a>
  <span class="nav-logo">Finance Tracker</span>
  <button class="theme-toggle" onclick="toggleTheme()">🌙 Dark</button>
</nav>

<div class="wrap">

  <div class="summary">
    <div class="s-card income"><div class="lbl">Income</div><div class="num" id="inc">₦0</div></div>
    <div class="s-card expense"><div class="lbl">Expenses</div><div class="num" id="exp">₦0</div></div>
    <div class="s-card"><div class="lbl">Balance</div><div class="num" id="bal">₦0</div></div>
  </div>

  <div class="card">
    <div class="card-title">Add Transaction</div>
    <div class="form-row">
      <input id="desc" placeholder="Description e.g. Salary">
      <input id="amt" type="number" placeholder="Amount (₦)" min="0">
    </div>
    <div class="form-row">
      <select id="type">
        <option value="income">Income</option>
        <option value="expense">Expense</option>
      </select>
      <input id="date" type="date">
    </div>
    <button class="add-btn" onclick="addTx()">+ Add Transaction</button>
  </div>

  <div class="filter-row">
    <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
    <button class="filter-btn" onclick="setFilter('income',this)">Income</button>
    <button class="filter-btn" onclick="setFilter('expense',this)">Expense</button>
  </div>

  <div class="card" id="list"></div>

  <div class="chart-card">
    <div class="chart-title">Income vs Expenses</div>
    <canvas id="financeChart"></canvas>
  </div>

</div>

<script>
let txs = JSON.parse(localStorage.getItem("msa_txs") || "[]");
let filter = "all";
let chart;

// Set today's date as default
document.getElementById("date").valueAsDate = new Date();

// Theme
if(localStorage.getItem("theme") === "dark") document.body.classList.add("dark");
function toggleTheme(){
  document.body.classList.toggle("dark");
  localStorage.setItem("theme", document.body.classList.contains("dark") ? "dark" : "light");
}

function addTx(){
  const desc = document.getElementById("desc").value.trim();
  const amt = parseFloat(document.getElementById("amt").value);
  const type = document.getElementById("type").value;
  const date = document.getElementById("date").value || new Date().toISOString().split("T")[0];
  if(!desc || !amt || amt <= 0) return;
  txs.push({ id: Date.now(), desc, amt, type, date });
  save(); render();
  document.getElementById("desc").value = "";
  document.getElementById("amt").value = "";
}

function save(){ localStorage.setItem("msa_txs", JSON.stringify(txs)); }

function del(id){
  txs = txs.filter(t => t.id !== id);
  save(); render();
}

function setFilter(f, btn){
  filter = f;
  document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  render();
}

function render(){
  const filtered = filter === "all" ? txs : txs.filter(t => t.type === filter);
  const sorted = [...filtered].sort((a,b) => new Date(b.date) - new Date(a.date));
  const list = document.getElementById("list");

  list.innerHTML = sorted.length ? sorted.map(t => `
    <div class="tx ${t.type === 'income' ? 'inc' : 'exp'}">
      <div class="tx-left">
        <span class="tx-desc">${t.desc}</span>
        <span class="tx-date">${t.date}</span>
      </div>
      <div class="tx-right">
        <span class="tx-amt">${t.type === 'income' ? '+' : '-'}₦${t.amt.toLocaleString()}</span>
        <button class="del-btn" onclick="del(${t.id})">×</button>
      </div>
    </div>
  `).join("") : '<div class="empty">No transactions yet. Add one above!</div>';

  const inc = txs.filter(t => t.type === "income").reduce((a,b) => a + b.amt, 0);
  const exp = txs.filter(t => t.type === "expense").reduce((a,b) => a + b.amt, 0);
  const bal = inc - exp;

  document.getElementById("inc").textContent = "₦" + inc.toLocaleString();
  document.getElementById("exp").textContent = "₦" + exp.toLocaleString();
  const balEl = document.getElementById("bal");
  balEl.textContent = "₦" + Math.abs(bal).toLocaleString();
  balEl.style.color = bal >= 0 ? "#22c55e" : "#ef4444";

  updateChart(inc, exp);
}

function updateChart(inc, exp){
  const ctx = document.getElementById("financeChart").getContext("2d");
  if(chart) chart.destroy();
  chart = new Chart(ctx, {
    type: "doughnut",
    data: {
      labels: ["Income", "Expense"],
      datasets:[{ data: [inc, exp], backgroundColor: ["#22c55e","#ef4444"], borderWidth: 0 }]
    },
    options: { plugins:{ legend:{ position:'bottom' } }, cutout:'65%' }
  });
}

render();
</script>
</body>
</html>
