<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans)}
.wrap{max-width:560px;margin:1.5rem auto;padding:0 1rem}
.summary{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:1.25rem}
.s-card{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:0.85rem 1rem}
.s-card .lbl{font-size:11px;color:var(--color-text-secondary);margin-bottom:4px}
.s-card .num{font-size:20px;font-weight:500;color:var(--color-text-primary)}
.s-card.income .num{color:#3B6D11}
.s-card.expense .num{color:#A32D2D}
.s-card.balance .num{color:var(--color-text-primary)}
.card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1.25rem;margin-bottom:1rem}
.card-title{font-size:15px;font-weight:500;color:var(--color-text-primary);margin-bottom:1rem}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.form-row.three{grid-template-columns:2fr 1fr 1fr}
.field{display:flex;flex-direction:column;gap:5px}
.field label{font-size:11px;color:var(--color-text-secondary);letter-spacing:0.04em}
.field input,.field select{width:100%;font-size:14px}
.add-btn{width:100%;padding:0.7rem;background:var(--color-background-primary);border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);font-size:14px;font-weight:500;color:var(--color-text-primary);cursor:pointer;transition:background 0.15s;margin-top:4px}
.add-btn:hover{background:var(--color-background-secondary)}
.tx-list{display:flex;flex-direction:column;gap:8px;max-height:280px;overflow-y:auto}
.tx{display:flex;align-items:center;gap:12px;padding:0.7rem 0.85rem;background:var(--color-background-secondary);border-radius:var(--border-radius-md)}
.tx-icon{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.tx-icon.inc{background:#EAF3DE;color:#3B6D11}
.tx-icon.exp{background:#FCEBEB;color:#A32D2D}
.tx-info{flex:1;min-width:0}
.tx-name{font-size:14px;font-weight:500;color:var(--color-text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tx-cat{font-size:11px;color:var(--color-text-secondary)}
.tx-date{font-size:11px;color:var(--color-text-tertiary)}
.tx-amt{font-size:14px;font-weight:500;flex-shrink:0}
.tx-amt.inc{color:#3B6D11}
.tx-amt.exp{color:#A32D2D}
.tx-del{background:none;border:none;cursor:pointer;color:var(--color-text-tertiary);font-size:16px;padding:0 4px;line-height:1}
.tx-del:hover{color:#A32D2D}
.empty{text-align:center;padding:2rem;color:var(--color-text-tertiary);font-size:13px}
.filter-row{display:flex;gap:8px;margin-bottom:1rem}
.filter-btn{flex:1;padding:0.45rem;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);background:var(--color-background-primary);font-size:12px;color:var(--color-text-secondary);cursor:pointer;transition:all 0.15s}
.filter-btn.active{background:var(--color-text-primary);color:var(--color-background-primary);border-color:var(--color-text-primary)}
</style>

<div class="wrap">
  <div class="summary">
    <div class="s-card income"><div class="lbl">Income</div><div class="num" id="totalInc">₦0</div></div>
    <div class="s-card expense"><div class="lbl">Expenses</div><div class="num" id="totalExp">₦0</div></div>
    <div class="s-card balance"><div class="lbl">Balance</div><div class="num" id="totalBal">₦0</div></div>
  </div>

  <div class="card">
    <p class="card-title">Add transaction</p>
    <div class="form-row three">
      <div class="field"><label>Description</label><input type="text" id="desc" placeholder="e.g. Salary" /></div>
      <div class="field"><label>Amount (₦)</label><input type="number" id="amt" placeholder="0" min="0" /></div>
      <div class="field"><label>Type</label>
        <select id="type">
          <option value="income">Income</option>
          <option value="expense">Expense</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="field"><label>Category</label>
        <select id="cat">
          <option>Salary</option><option>Freelance</option><option>Food</option>
          <option>Transport</option><option>Bills</option><option>Shopping</option>
          <option>Health</option><option>Other</option>
        </select>
      </div>
      <div class="field"><label>Date</label><input type="date" id="date" /></div>
    </div>
    <button class="add-btn" onclick="addTx()">+ Add transaction</button>
  </div>

  <div class="card">
    <p class="card-title">Transactions</p>
    <div class="filter-row">
      <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
      <button class="filter-btn" onclick="setFilter('income',this)">Income</button>
      <button class="filter-btn" onclick="setFilter('expense',this)">Expenses</button>
    </div>
    <div class="tx-list" id="txList"></div>
  </div>
</div>

<script>
let txs=JSON.parse(localStorage.getItem('msa_finance')||'[]');
let filter='all';

const fmt=n=>'₦'+Math.round(n).toLocaleString();

const cats={Salary:'S',Freelance:'F',Food:'F',Transport:'T',Bills:'B',Shopping:'S',Health:'H',Other:'O'};

function save(){localStorage.setItem('msa_finance',JSON.stringify(txs));}

function render(){
  const inc=txs.filter(t=>t.type==='income').reduce((a,t)=>a+t.amt,0);
  const exp=txs.filter(t=>t.type==='expense').reduce((a,t)=>a+t.amt,0);
  const bal=inc-exp;
  document.getElementById('totalInc').textContent=fmt(inc);
  document.getElementById('totalExp').textContent=fmt(exp);
  const balEl=document.getElementById('totalBal');
  balEl.textContent=fmt(bal);
  balEl.style.color=bal>=0?'#3B6D11':'#A32D2D';

  const list=document.getElementById('txList');
  const filtered=filter==='all'?txs:txs.filter(t=>t.type===filter);
  const sorted=[...filtered].sort((a,b)=>new Date(b.date)-new Date(a.date));

  if(!sorted.length){list.innerHTML='<div class="empty">No transactions yet. Add one above!</div>';return;}

  list.innerHTML=sorted.map(t=>`
    <div class="tx">
      <div class="tx-icon ${t.type==='income'?'inc':'exp'}">${cats[t.cat]||'O'}</div>
      <div class="tx-info">
        <div class="tx-name">${t.desc}</div>
        <div class="tx-cat">${t.cat} &middot; <span class="tx-date">${t.date}</span></div>
      </div>
      <div class="tx-amt ${t.type==='income'?'inc':'exp'}">${t.type==='income'?'+':'-'}${fmt(t.amt)}</div>
      <button class="tx-del" onclick="deleteTx('${t.id}')">×</button>
    </div>
  `).join('');
}

function addTx(){
  const desc=document.getElementById('desc').value.trim();
  const amt=parseFloat(document.getElementById('amt').value);
  const type=document.getElementById('type').value;
  const cat=document.getElementById('cat').value;
  const date=document.getElementById('date').value||new Date().toISOString().split('T')[0];
  if(!desc||!amt||amt<=0)return;
  txs.push({id:Date.now().toString(),desc,amt,type,cat,date});
  save();render();
  document.getElementById('desc').value='';
  document.getElementById('amt').value='';
}

function deleteTx(id){txs=txs.filter(t=>t.id!==id);save();render();}

function setFilter(f,btn){
  filter=f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

document.getElementById('date').valueAsDate=new Date();
render();
</script>
